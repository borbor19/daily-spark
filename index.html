    align-items: center;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {

    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #1a3a8a, #2563eb);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }

  .logo h1 {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 15px;
    color: #7a8baa;
    font-weight: 400;
  }

  .stats {
    margin-top: 8px;
    font-size: 13px;
    color: #4b5e7a;
  }

  .stats span {
    color: #60a5fa;
    font-weight: 600;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    background: #111827;
    border-radius: 12px;
    padding: 4px;
    border: 1px solid #1e2d4a;
  }

  .tab {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: #4b5e7a;
    transition: all 0.2s ease;
  }

  .tab.active {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
  }

  .tab:not(.active):hover {
    color: #d1d5db;
  }

  .quotes-container {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .quote-card {
    background: linear-gradient(135deg, #111827, #1a2235);
    border: 1px solid #1e2d4a;
    border-radius: 16px;
    padding: 32px 36px;
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.5s ease forwards;
    -webkit-tap-highlight-color: transparent;
  }

  .quote-card.copied {
    border-color: #16a34a;
    background: linear-gradient(135deg, #0f1f15, #132a1a);
  }

  .quote-card.history-card {
    opacity: 1;
    transform: none;
    animation: none;
  }

  .quote-card:nth-child(1) { animation-delay: 0.05s; }
  .quote-card:nth-child(2) { animation-delay: 0.12s; }
  .quote-card:nth-child(3) { animation-delay: 0.19s; }
  .quote-card:nth-child(4) { animation-delay: 0.26s; }
  .quote-card:nth-child(5) { animation-delay: 0.33s; }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .quote-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .quote-number {
    font-size: 13px;
    font-weight: 600;
    color: #2563eb;
    background: rgba(37, 99, 235, 0.1);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .quote-date {
    font-size: 12px;
    color: #4b5e7a;
  }

  .btn-copy {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #1e2d4a;
    background: #1a2235;
    color: #7a8baa;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-copy:hover {
    background: #1e2d4a;
    color: #d1d5db;
  }

  .btn-copy.done {
    background: rgba(22, 163, 74, 0.15);
    border-color: #16a34a;
    color: #4ade80;
    pointer-events: none;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 19px;
    line-height: 1.6;
    color: #d1d5db;
    margin-bottom: 16px;
  }

  .quote-text::before { content: '\201C'; }
  .quote-text::after { content: '\201D'; }

  .quote-author {
    font-size: 14px;
    font-weight: 600;
    color: #60a5fa;
  }

  .quote-role {
    font-size: 13px;
    color: #4b5e7a;
    margin-top: 2px;
  }

  .actions {
    margin-top: 40px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);

  }

  .btn-primary:hover {

  }

  .btn-secondary {

    color: #7a8baa;
    border: 1px solid #1e2d4a;
  }

  .btn-secondary:hover {
    background: #1e2d4a;
    color: #d1d5db;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1d4ed8;
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 10;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #4b5e7a;
  }

  .empty-state h2 {
    font-size: 22px;
    color: #7a8baa;
    margin-bottom: 8px;
  }

  .empty-state p {

  }

    width: 100%;
    max-width: 720px;
    margin-bottom: 20px;
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid #1e2d4a;

    font-size: 14px;

  }

  .history-search:focus {
    border-color: #2563eb;
  }

  .history-search::placeholder {
    color: #4b5e7a;
  }

  @media (max-width: 600px) {
    body { padding: 24px 12px; }
    .header { margin-bottom: 28px; }
    .logo h1 { font-size: 22px; }
    .logo-icon { width: 40px; height: 40px; font-size: 20px; }

    .quote-text { font-size: 16px; }
    .quote-author { font-size: 13px; }
    .quote-role { font-size: 12px; }
    .actions { flex-direction: column; gap: 10px; width: 100%; max-width: 720px; }
    .btn { width: 100%; text-align: center; }
    .tab { padding: 8px 16px; font-size: 13px; }

let currentTab = 'generate';
let currentQuotes = [];

function getCopiedHistory() {
  try {
    return JSON.parse(localStorage.getItem('ds_copied_history') || '[]');
  } catch { return []; }
}

function getCopiedIds() {
  return getCopiedHistory().map(h => h.id);
}

function saveCopied(q) {
  const history = getCopiedHistory();
  const id = getQuoteId(q);
  if (!history.find(h => h.id === id)) {
    history.unshift({ id, text: q.text, author: q.author, role: q.role, date: new Date().toISOString() });
    localStorage.setItem('ds_copied_history', JSON.stringify(history));
  }
}

function getQuoteId(q) {
  return q.author + '::' + q.text.substring(0, 40);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateStats() {
  const copiedIds = getCopiedIds();
  const remaining = quotes.filter(q => !copiedIds.includes(getQuoteId(q))).length;
  document.getElementById('stats').innerHTML =
    `<span>${remaining}</span> quotes remaining &middot; <span>${copiedIds.length}</span> used`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'generate') || (i === 1 && tab === 'history'));
  });
  if (tab === 'generate') {
    document.getElementById('search-wrap').innerHTML = '';
    document.getElementById('actions').style.display = 'flex';
    refresh();
  } else {
    document.getElementById('actions').style.display = 'none';
    document.getElementById('search-wrap').innerHTML =
      '<input class="history-search" type="text" placeholder="Search your copied quotes..." oninput="renderHistory(this.value)">';
    renderHistory('');
  }
}

function renderHistory(filter) {
  const container = document.getElementById('quotes');
  const history = getCopiedHistory();
  const filtered = filter
    ? history.filter(h => h.text.toLowerCase().includes(filter.toLowerCase()) || h.author.toLowerCase().includes(filter.toLowerCase()))
    : history;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h2>${filter ? 'No matches' : 'No history yet'}</h2>
        <p>${filter ? 'Try a different search term.' : 'Copy some quotes and they\\'ll appear here.'}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map((h, i) => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    return `
    <div class="quote-card history-card">
      <div class="quote-top">
        <span class="quote-number">${filtered.length - i}</span>
        <span class="quote-date">${dateStr}</span>
      </div>
      <p class="quote-text">${h.text}</p>
      <p class="quote-author">— ${h.author}</p>
      ${h.role ? `<p class="quote-role">${h.role}</p>` : ''}
    </div>`;
  }).join('');
}

function render(selected) {
  currentQuotes = selected;
  const container = document.getElementById('quotes');

  if (selected.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h2>All quotes used!</h2>
        <p>You've gone through all ${quotes.length} quotes. Reset the history to start fresh.</p>
      </div>`;
    return;
  }

  container.innerHTML = selected.map((q, i) => `
    <div class="quote-card" id="card-${i}">
      <div class="quote-top">
        <span class="quote-number">${i + 1}</span>
        <button class="btn-copy" onclick="copyOne(${i})">
          <span>Copy</span>
        </button>
      </div>
      <p class="quote-text">${q.text}</p>
      <p class="quote-author">— ${q.author}</p>
      ${q.role ? `<p class="quote-role">${q.role}</p>` : ''}
    </div>
  `).join('');
  updateStats();
}

function refresh() {
  const copiedIds = getCopiedIds();
  const available = quotes.filter(q => !copiedIds.includes(getQuoteId(q)));
  const pick = shuffle(available).slice(0, 5);
  render(pick);
}

function copyOne(index) {
  const q = currentQuotes[index];
  const text = `“${q.text}”\n— ${q.author}${q.role ? ', ' + q.role : ''}`;
  navigator.clipboard.writeText(text);

  saveCopied(q);

  const card = document.getElementById('card-' + index);
  card.classList.add('copied');
  const btn = card.querySelector('.btn-copy');
  btn.classList.add('done');
  btn.innerHTML = '<span>✓ Copied</span>';

  updateStats();
  showToast('Quote copied — it won’t appear again');
}

function resetHistory() {
  if (confirm('Reset history? All quotes will become available again.')) {
    localStorage.removeItem('ds_copied_history');
    showToast('History cleared — all quotes available');
    refresh();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Migrate old format
(function migrate() {
  const old = localStorage.getItem('ds_copied_quotes');
  if (old && !localStorage.getItem('ds_copied_history')) {
    try {
      const ids = JSON.parse(old);
      const history = ids.map(id => {
        const q = quotes.find(q => getQuoteId(q) === id);
        return q ? { id, text: q.text, author: q.author, role: q.role, date: new Date().toISOString() } : null;
      }).filter(Boolean);
      localStorage.setItem('ds_copied_history', JSON.stringify(history));
      localStorage.removeItem('ds_copied_quotes');
    } catch {}
  }
})();

refresh();
</script>
