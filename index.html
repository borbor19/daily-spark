<title>Daily Spark — Quote Generator</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0e1a;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #1a3a8a, #2563eb);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }

  .logo h1 {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 15px;
    color: #7a8baa;
    font-weight: 400;
  }

  .stats {
    margin-top: 8px;
    font-size: 13px;
    color: #4b5e7a;
  }

  .stats span {
    color: #60a5fa;
    font-weight: 600;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    background: #111827;
    border-radius: 12px;
    padding: 4px;
    border: 1px solid #1e2d4a;
  }

  .tab {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: #4b5e7a;
    transition: all 0.2s ease;
  }

  .tab.active {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
  }

  .tab:not(.active):hover {
    color: #d1d5db;
  }

  .quotes-container {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .quote-card {
    background: linear-gradient(135deg, #111827, #1a2235);
    border: 1px solid #1e2d4a;
    border-radius: 16px;
    padding: 32px 36px;
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.5s ease forwards;
    -webkit-tap-highlight-color: transparent;
  }

  .quote-card.copied {
    border-color: #16a34a;
    background: linear-gradient(135deg, #0f1f15, #132a1a);
  }

  .quote-card.history-card {
    opacity: 1;
    transform: none;
    animation: none;
  }

  .quote-card:nth-child(1) { animation-delay: 0.05s; }
  .quote-card:nth-child(2) { animation-delay: 0.12s; }
  .quote-card:nth-child(3) { animation-delay: 0.19s; }
  .quote-card:nth-child(4) { animation-delay: 0.26s; }
  .quote-card:nth-child(5) { animation-delay: 0.33s; }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .quote-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .quote-number {
    font-size: 13px;
    font-weight: 600;
    color: #2563eb;
    background: rgba(37, 99, 235, 0.1);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .quote-date {
    font-size: 12px;
    color: #4b5e7a;
  }

  .btn-copy {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #1e2d4a;
    background: #1a2235;
    color: #7a8baa;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-copy:hover {
    background: #1e2d4a;
    color: #d1d5db;
  }

  .btn-copy.done {
    background: rgba(22, 163, 74, 0.15);
    border-color: #16a34a;
    color: #4ade80;
    pointer-events: none;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 19px;
    line-height: 1.6;
    color: #d1d5db;
    margin-bottom: 16px;
  }

  .quote-text::before { content: '\201C'; }
  .quote-text::after { content: '\201D'; }

  .quote-author {
    font-size: 14px;
    font-weight: 600;
    color: #60a5fa;
  }

  .quote-role {
    font-size: 13px;
    color: #4b5e7a;
    margin-top: 2px;
  }

  .actions {
    margin-top: 40px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
  }

  .btn-primary:hover {

  }

  .btn-secondary {
    background: #1a2235;
    color: #7a8baa;
    border: 1px solid #1e2d4a;
  }

  .btn-secondary:hover {
    background: #1e2d4a;
    color: #d1d5db;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1d4ed8;
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 10;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #4b5e7a;
  }

  .empty-state h2 {
    font-size: 22px;
    color: #7a8baa;
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 15px;
    margin-bottom: 24px;
  }

  .history-search {
    width: 100%;
    max-width: 720px;
    margin-bottom: 20px;
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid #1e2d4a;
    background: #111827;
    color: #d1d5db;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;

  }

  .history-search:focus {
    border-color: #2563eb;
  }

  .history-search::placeholder {
    color: #4b5e7a;
  }

  @media (max-width: 600px) {
    body { padding: 24px 12px; }
    .header { margin-bottom: 28px; }
    .logo h1 { font-size: 22px; }
    .logo-icon { width: 40px; height: 40px; font-size: 20px; }
    .quote-card { padding: 20px 18px; border-radius: 12px; }
    .quote-text { font-size: 16px; }
    .quote-author { font-size: 13px; }
    .quote-role { font-size: 12px; }
    .actions { flex-direction: column; gap: 10px; width: 100%; max-width: 720px; }
    .btn { width: 100%; text-align: center; }
    .tab { padding: 8px 16px; font-size: 13px; }
  }

  { text: "In order to be irreplaceable, one must always be different.", author: "Coco Chanel", role: "Fashion Designer" },
  { text: "Success is most often achieved by those who don't know that failure is inevitable.", author: "Coco Chanel", role: "Fashion Designer" },
  { text: "Be yourself; everyone else is already taken.", author: "Oscar Wilde", role: "Playwright & Poet" },
  { text: "To live is the rarest thing in the world. Most people exist, that is all.", author: "Oscar Wilde", role: "Playwright & Poet" },
  { text: "Experience is merely the name men gave to their mistakes.", author: "Oscar Wilde", role: "Playwright & Poet" },
  { text: "Always forgive your enemies; nothing annoys them so much.", author: "Oscar Wilde", role: "Playwright & Poet" },
  { text: "We are all in the gutter, but some of us are looking at the stars.", author: "Oscar Wilde", role: "Playwright & Poet" },
  { text: "The truth is rarely pure and never simple.", author: "Oscar Wilde", role: "Playwright & Poet" },
  { text: "When I dare to be powerful, to use my strength in the service of my vision, then it becomes less and less important whether I am afraid.", author: "Audre Lorde", role: "Writer & Activist" },
  { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar", role: "Author & Motivational Speaker" },
  { text: "What you get by achieving your goals is not as important as what you become by achieving your goals.", author: "Zig Ziglar", role: "Author & Motivational Speaker" },
  { text: "People often say that motivation doesn't last. Well, neither does bathing — that's why we recommend it daily.", author: "Zig Ziglar", role: "Author & Motivational Speaker" },
  { text: "I am not a product of my circumstances. I am a product of my decisions.", author: "Stephen Covey", role: "Author, The 7 Habits of Highly Effective People" },
  { text: "Begin with the end in mind.", author: "Stephen Covey", role: "Author, The 7 Habits of Highly Effective People" },
  { text: "The main thing is to keep the main thing the main thing.", author: "Stephen Covey", role: "Author, The 7 Habits of Highly Effective People" },
  { text: "Seek first to understand, then to be understood.", author: "Stephen Covey", role: "Author, The 7 Habits of Highly Effective People" },
  { text: "Leadership is not about being in charge. It is about taking care of those in your charge.", author: "Simon Sinek", role: "Author & Speaker" },
  { text: "People don't buy what you do; they buy why you do it.", author: "Simon Sinek", role: "Author & Speaker" },
  { text: "Working hard for something we don't care about is called stress; working hard for something we love is called passion.", author: "Simon Sinek", role: "Author & Speaker" },
  { text: "A team is not a group of people who work together. A team is a group of people who trust each other.", author: "Simon Sinek", role: "Author & Speaker" },
  { text: "It is not the strongest of the species that survive, nor the most intelligent, but the one most responsive to change.", author: "Charles Darwin", role: "Naturalist" },
  { text: "I attribute my success to this: I never gave or took any excuse.", author: "Florence Nightingale", role: "Founder of Modern Nursing" },
  { text: "The best and most beautiful things in the world cannot be seen or even touched — they must be felt with the heart.", author: "Helen Keller", role: "Author & Activist" },
  { text: "Alone we can do so little; together we can do so much.", author: "Helen Keller", role: "Author & Activist" },
  { text: "Life is either a daring adventure or nothing at all.", author: "Helen Keller", role: "Author & Activist" },
  { text: "The only thing worse than being blind is having sight but no vision.", author: "Helen Keller", role: "Author & Activist" },
  { text: "Although the world is full of suffering, it is also full of the overcoming of it.", author: "Helen Keller", role: "Author & Activist" },
  { text: "Keep your face always toward the sunshine — and shadows will fall behind you.", author: "Walt Whitman", role: "Poet" },
  { text: "Not how long, but how well you have lived is the main thing.", author: "Seneca", role: "Roman Philosopher" },
  { text: "Luck is what happens when preparation meets opportunity.", author: "Seneca", role: "Roman Philosopher" },
  { text: "We suffer more often in imagination than in reality.", author: "Seneca", role: "Roman Philosopher" },
  { text: "It is not that we have a short time to live, but that we waste a great deal of it.", author: "Seneca", role: "Roman Philosopher" },
  { text: "Difficulties strengthen the mind, as labor does the body.", author: "Seneca", role: "Roman Philosopher" },
  { text: "Begin at once to live, and count each separate day as a separate life.", author: "Seneca", role: "Roman Philosopher" },
  { text: "True happiness is to enjoy the present, without anxious dependence upon the future.", author: "Seneca", role: "Roman Philosopher" },
  { text: "You have power over your mind — not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius", role: "Roman Emperor & Philosopher" },
  { text: "Waste no more time arguing about what a good man should be. Be one.", author: "Marcus Aurelius", role: "Roman Emperor & Philosopher" },
  { text: "The happiness of your life depends upon the quality of your thoughts.", author: "Marcus Aurelius", role: "Roman Emperor & Philosopher" },
  { text: "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.", author: "Marcus Aurelius", role: "Roman Emperor & Philosopher" },
  { text: "When you arise in the morning, think of what a precious privilege it is to be alive.", author: "Marcus Aurelius", role: "Roman Emperor & Philosopher" },
  { text: "The soul becomes dyed with the color of its thoughts.", author: "Marcus Aurelius", role: "Roman Emperor & Philosopher" },
  { text: "Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.", author: "Marcus Aurelius", role: "Roman Emperor & Philosopher" },
  { text: "No man is free who is not master of himself.", author: "Epictetus", role: "Stoic Philosopher" },
  { text: "First say to yourself what you would be; and then do what you have to do.", author: "Epictetus", role: "Stoic Philosopher" },
  { text: "It is not what happens to you, but how you react to it that matters.", author: "Epictetus", role: "Stoic Philosopher" },
  { text: "Make the best use of what is in your power, and take the rest as it happens.", author: "Epictetus", role: "Stoic Philosopher" },
  { text: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche", role: "Philosopher" },
  { text: "That which does not kill us makes us stronger.", author: "Friedrich Nietzsche", role: "Philosopher" },
  { text: "Without music, life would be a mistake.", author: "Friedrich Nietzsche", role: "Philosopher" },
  { text: "You must have chaos within you to give birth to a dancing star.", author: "Friedrich Nietzsche", role: "Philosopher" },
  { text: "In the depth of winter, I finally learned that within me there lay an invincible summer.", author: "Albert Camus", role: "Philosopher & Author, Nobel Laureate" },
  { text: "The only way to deal with an unfree world is to become so absolutely free that your very existence is an act of rebellion.", author: "Albert Camus", role: "Philosopher & Author, Nobel Laureate" },
  { text: "In three words I can sum up everything I have learned about life: it goes on.", author: "Robert Frost", role: "Poet" },
  { text: "Two roads diverged in a wood, and I took the one less traveled by, and that has made all the difference.", author: "Robert Frost", role: "Poet" },
  { text: "The best way out is always through.", author: "Robert Frost", role: "Poet" },
  { text: "Darkness cannot drive out darkness; only light can do that. Hate cannot drive out hate; only love can do that.", author: "Martin Luther King Jr.", role: "Civil Rights Leader, Nobel Laureate" },
  { text: "The time is always right to do what is right.", author: "Martin Luther King Jr.", role: "Civil Rights Leader, Nobel Laureate" },
  { text: "Injustice anywhere is a threat to justice everywhere.", author: "Martin Luther King Jr.", role: "Civil Rights Leader, Nobel Laureate" },
  { text: "If you can't fly then run, if you can't run then walk, if you can't walk then crawl, but whatever you do you have to keep moving forward.", author: "Martin Luther King Jr.", role: "Civil Rights Leader, Nobel Laureate" },
  { text: "The ultimate measure of a man is not where he stands in moments of comfort, but where he stands at times of challenge and controversy.", author: "Martin Luther King Jr.", role: "Civil Rights Leader, Nobel Laureate" },
  { text: "Our lives begin to end the day we become silent about things that matter.", author: "Martin Luther King Jr.", role: "Civil Rights Leader, Nobel Laureate" },
  { text: "Faith is taking the first step even when you don't see the whole staircase.", author: "Martin Luther King Jr.", role: "Civil Rights Leader, Nobel Laureate" },
  { text: "I have learned over the years that when one's mind is made up, this diminishes fear.", author: "Rosa Parks", role: "Civil Rights Activist" },
  { text: "The most common way people give up their power is by thinking they don't have any.", author: "Alice Walker", role: "Author & Activist, Pulitzer Prize Winner" },
  { text: "He who opens a school door, closes a prison.", author: "Victor Hugo", role: "Author" },
  { text: "Even the darkest night will end and the sun will rise.", author: "Victor Hugo", role: "Author" },
  { text: "How wonderful it is that nobody need wait a single moment before starting to improve the world.", author: "Anne Frank", role: "Diarist" },
  { text: "Whoever is happy will make others happy too.", author: "Anne Frank", role: "Diarist" },
  { text: "In spite of everything I still believe that people are really good at heart.", author: "Anne Frank", role: "Diarist" },
  { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci", role: "Polymath & Artist" },
  { text: "Learning never exhausts the mind.", author: "Leonardo da Vinci", role: "Polymath & Artist" },
  { text: "It had long since come to my attention that people of accomplishment rarely sat back and let things happen to them. They went out and happened to things.", author: "Leonardo da Vinci", role: "Polymath & Artist" },
  { text: "Dare to know! Have the courage to use your own understanding.", author: "Immanuel Kant", role: "Philosopher" },
  { text: "Be water, my friend.", author: "Bruce Lee", role: "Martial Artist & Actor" },
  { text: "Adapt what is useful, reject what is useless, and add what is specifically your own.", author: "Bruce Lee", role: "Martial Artist & Actor" },
  { text: "I fear not the man who has practiced 10,000 kicks once, but I fear the man who has practiced one kick 10,000 times.", author: "Bruce Lee", role: "Martial Artist & Actor" },
  { text: "The successful warrior is the average man, with laser-like focus.", author: "Bruce Lee", role: "Martial Artist & Actor" },
  { text: "Don't count the days; make the days count.", author: "Muhammad Ali", role: "Boxing Champion" },
  { text: "He who is not courageous enough to take risks will accomplish nothing in life.", author: "Muhammad Ali", role: "Boxing Champion" },
  { text: "Impossible is just a big word thrown around by small men who find it easier to live in the world they've been given than to explore the power they have to change it.", author: "Muhammad Ali", role: "Boxing Champion" },
  { text: "Service to others is the rent you pay for your room here on earth.", author: "Muhammad Ali", role: "Boxing Champion" },
  { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "The best way to find yourself is to lose yourself in the service of others.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "Strength does not come from physical capacity. It comes from an indomitable will.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "In a gentle way, you can shake the world.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "The weak can never forgive. Forgiveness is the attribute of the strong.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "You must not lose faith in humanity. Humanity is an ocean; if a few drops of the ocean are dirty, the ocean does not become dirty.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "Talent wins games, but teamwork and intelligence win championships.", author: "Michael Jordan", role: "Basketball Legend" },
  { text: "I can accept failure, everyone fails at something. But I can't accept not trying.", author: "Michael Jordan", role: "Basketball Legend" },
  { text: "Some people want it to happen, some wish it would happen, others make it happen.", author: "Michael Jordan", role: "Basketball Legend" },
  { text: "Obstacles don't have to stop you. If you run into a wall, don't turn around and give up. Figure out how to climb it.", author: "Michael Jordan", role: "Basketball Legend" },
  { text: "I have failed over and over and over again in my life. And that is why I succeed.", author: "Michael Jordan", role: "Basketball Legend" },
  { text: "Champions keep playing until they get it right.", author: "Billie Jean King", role: "Tennis Champion" },
  { text: "One day or day one. You decide.", author: "Paulo Coelho", role: "Author, The Alchemist" },
  { text: "When you want something, all the universe conspires in helping you to achieve it.", author: "Paulo Coelho", role: "Author, The Alchemist" },
  { text: "It is our choices that show what we truly are, far more than our abilities.", author: "J.K. Rowling", role: "Author" },
  { text: "Rock bottom became the solid foundation on which I rebuilt my life.", author: "J.K. Rowling", role: "Author" },
  { text: "It takes a great deal of bravery to stand up to our enemies, but just as much to stand up to our friends.", author: "J.K. Rowling", role: "Author" },
  { text: "The world breaks everyone, and afterward, many are strong at the broken places.", author: "Ernest Hemingway", role: "Author & Journalist, Nobel Laureate" },
  { text: "There is nothing noble in being superior to your fellow man; true nobility is being superior to your former self.", author: "Ernest Hemingway", role: "Author & Journalist, Nobel Laureate" },
  { text: "Courage is grace under pressure.", author: "Ernest Hemingway", role: "Author & Journalist, Nobel Laureate" },
  { text: "Education is not the filling of a pail, but the lighting of a fire.", author: "William Butler Yeats", role: "Poet, Nobel Laureate" },
  { text: "Let everything happen to you: beauty and terror. Just keep going. No feeling is final.", author: "Rainer Maria Rilke", role: "Poet" },
  { text: "The only journey is the one within.", author: "Rainer Maria Rilke", role: "Poet" },
  { text: "Kind words can be short and easy to speak, but their echoes are truly endless.", author: "Mother Teresa", role: "Humanitarian, Nobel Laureate" },
  { text: "If you judge people, you have no time to love them.", author: "Mother Teresa", role: "Humanitarian, Nobel Laureate" },
  { text: "Not all of us can do great things. But we can do small things with great love.", author: "Mother Teresa", role: "Humanitarian, Nobel Laureate" },
  { text: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", author: "Mother Teresa", role: "Humanitarian, Nobel Laureate" },
  { text: "Between stimulus and response there is a space. In that space is our power to choose our response.", author: "Viktor Frankl", role: "Psychiatrist & Holocaust Survivor" },
  { text: "When we are no longer able to change a situation, we are challenged to change ourselves.", author: "Viktor Frankl", role: "Psychiatrist & Holocaust Survivor" },
  { text: "Everything can be taken from a man but one thing: the last of the human freedoms — to choose one's attitude in any given set of circumstances.", author: "Viktor Frankl", role: "Psychiatrist & Holocaust Survivor" },
  { text: "The privilege of a lifetime is to become who you truly are.", author: "Carl Jung", role: "Psychiatrist" },
  { text: "Until you make the unconscious conscious, it will direct your life and you will call it fate.", author: "Carl Jung", role: "Psychiatrist" },
  { text: "Who looks outside, dreams; who looks inside, awakes.", author: "Carl Jung", role: "Psychiatrist" },
  { text: "The cave you fear to enter holds the treasure you seek.", author: "Joseph Campbell", role: "Mythologist & Author" },
  { text: "Follow your bliss and the universe will open doors where there were only walls.", author: "Joseph Campbell", role: "Mythologist & Author" },
  { text: "A hero is someone who has given his or her life to something bigger than oneself.", author: "Joseph Campbell", role: "Mythologist & Author" },
  { text: "We do not see things as they are, we see them as we are.", author: "Anais Nin", role: "Author" },
  { text: "Life shrinks or expands in proportion to one's courage.", author: "Anais Nin", role: "Author" },
  { text: "Out of your vulnerabilities will come your strength.", author: "Sigmund Freud", role: "Founder of Psychoanalysis" },
  { text: "What a man can be, he must be. This need we call self-actualization.", author: "Abraham Maslow", role: "Psychologist" },
  { text: "The mind is its own place, and in itself can make a heaven of hell, a hell of heaven.", author: "John Milton", role: "Poet" },
  { text: "Wise men speak because they have something to say; fools because they have to say something.", author: "Plato", role: "Philosopher" },
  { text: "The greatest wealth is to live content with little.", author: "Plato", role: "Philosopher" },
  { text: "Good actions give strength to ourselves and inspire good actions in others.", author: "Plato", role: "Philosopher" },
  { text: "Mistakes are the portals of discovery.", author: "James Joyce", role: "Author" },
  { text: "Lao Tzu said the journey of a thousand miles begins with one step.", author: "Lao Tzu", role: "Philosopher, Author of Tao Te Ching" },
  { text: "Mastering others is strength. Mastering yourself is true power.", author: "Lao Tzu", role: "Philosopher, Author of Tao Te Ching" },
  { text: "Nature does not hurry, yet everything is accomplished.", author: "Lao Tzu", role: "Philosopher, Author of Tao Te Ching" },
  { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius", role: "Philosopher" },
  { text: "Our greatest glory is not in never falling, but in rising every time we fall.", author: "Confucius", role: "Philosopher" },
  { text: "Real knowledge is to know the extent of one's ignorance.", author: "Confucius", role: "Philosopher" },
  { text: "To see what is right and not do it is a lack of courage.", author: "Confucius", role: "Philosopher" },
  { text: "There are only two ways to live your life. One is as though nothing is a miracle. The other is as though everything is a miracle.", author: "Albert Einstein", role: "Physicist, Nobel Laureate" },
  { text: "The true measure of a man is how he treats someone who can do him absolutely no good.", author: "Samuel Johnson", role: "Author & Lexicographer" },
  { text: "The best time to plant a tree was twenty years ago. The second best time is now.", author: "Wangari Maathai", role: "Environmentalist, Nobel Laureate" },
  { text: "You can cut all the flowers but you cannot keep spring from coming.", author: "Pablo Neruda", role: "Poet, Nobel Laureate" },
  { text: "I can be changed by what happens to me. But I refuse to be reduced by it.", author: "Maya Angelou", role: "Poet & Author" },
  { text: "A person is a person through other persons. None of us comes into the world fully formed.", author: "Desmond Tutu", role: "Archbishop, Nobel Laureate" },
  { text: "Do your little bit of good where you are; it is those little bits of good put together that overwhelm the world.", author: "Desmond Tutu", role: "Archbishop, Nobel Laureate" },
  { text: "The greatest danger for most of us is not that our aim is too high and we miss it, but that it is too low and we reach it.", author: "Michelangelo", role: "Artist & Sculptor" },
  { text: "Every child is an artist. The problem is how to remain an artist once we grow up.", author: "Pablo Picasso", role: "Artist" },
  { text: "Action is the foundational key to all success.", author: "Pablo Picasso", role: "Artist" },
  { text: "Everything you can imagine is real.", author: "Pablo Picasso", role: "Artist" },
  { text: "Have no fear of perfection — you will never reach it.", author: "Salvador Dali", role: "Artist" },
  { text: "To invent, you need a good imagination and a pile of junk.", author: "Thomas Edison", role: "Inventor" },
  { text: "It is better to be feared than loved, if you cannot be both.", author: "Niccolo Machiavelli", role: "Political Philosopher" },
  { text: "I think, therefore I am.", author: "Rene Descartes", role: "Philosopher & Mathematician" },
  { text: "Liberty, when it begins to take root, is a plant of rapid growth.", author: "George Washington", role: "1st President of the United States" },
  { text: "In the end, it is not the years in your life that count. It is the life in your years.", author: "Abraham Lincoln", role: "16th President of the United States" },
  { text: "Whatever you are, be a good one.", author: "Abraham Lincoln", role: "16th President of the United States" },
  { text: "The best way to predict your future is to create it.", author: "Abraham Lincoln", role: "16th President of the United States" },
  { text: "Nearly all men can stand adversity, but if you want to test a man's character, give him power.", author: "Abraham Lincoln", role: "16th President of the United States" },
  { text: "Give me a lever long enough and a fulcrum on which to place it, and I shall move the world.", author: "Archimedes", role: "Mathematician & Inventor" },
  { text: "The unexamined life is not worth living.", author: "Socrates", role: "Philosopher" },
  { text: "Happiness depends upon ourselves.", author: "Aristotle", role: "Philosopher" },
  { text: "The roots of education are bitter, but the fruit is sweet.", author: "Aristotle", role: "Philosopher" },
  { text: "One cannot step twice in the same river.", author: "Heraclitus", role: "Philosopher" },
  { text: "The only constant in life is change.", author: "Heraclitus", role: "Philosopher" },
  { text: "Character is destiny.", author: "Heraclitus", role: "Philosopher" },
  { text: "To do two things at once is to do neither.", author: "Publilius Syrus", role: "Latin Writer" },
  { text: "Fortune favors the bold.", author: "Virgil", role: "Roman Poet" },
  { text: "We find comfort among those who agree with us — growth among those who don't.", author: "Frank A. Clark", role: "Author" },
  { text: "The mind, once stretched by a new idea, never returns to its original dimensions.", author: "Oliver Wendell Holmes Sr.", role: "Physician & Author" },
  { text: "What lies behind us and what lies ahead of us are tiny matters compared to what lives within us.", author: "Henry David Thoreau", role: "Philosopher & Author" },
  { text: "The mass of men lead lives of quiet desperation.", author: "Henry David Thoreau", role: "Philosopher & Author" },
  { text: "Not everything that is faced can be changed, but nothing can be changed until it is faced.", author: "James Baldwin", role: "Author & Activist" },
  { text: "Not everything that counts can be counted, and not everything that can be counted counts.", author: "William Bruce Cameron", role: "Author" },
  { text: "The world is a book, and those who do not travel read only one page.", author: "Saint Augustine", role: "Theologian & Philosopher" },
  { text: "The measure of a life is not its duration, but its donation.", author: "Corrie ten Boom", role: "Author & Holocaust Survivor" },
  { text: "Worry does not empty tomorrow of its sorrow, it empties today of its strength.", author: "Corrie ten Boom", role: "Author & Holocaust Survivor" },
  { text: "You gain strength, courage, and confidence by every experience in which you really stop to look fear in the face.", author: "Eleanor Roosevelt", role: "First Lady of the United States" },
  { text: "I have always depended on the kindness of strangers.", author: "Tennessee Williams", role: "Playwright" },
  { text: "The question is not what you look at, but what you see.", author: "Henry David Thoreau", role: "Philosopher & Author" },
  { text: "What we think determines what happens to us, so if we want to change our lives, we need to stretch our minds.", author: "Wayne Dyer", role: "Psychologist & Author" },
  { text: "If opportunity doesn't knock, build a door.", author: "Milton Berle", role: "Comedian & Actor" },
  { text: "The best preparation for tomorrow is doing your best today.", author: "H. Jackson Brown Jr.", role: "Author" },
  { text: "You can never cross the ocean until you have the courage to lose sight of the shore.", author: "Christopher Columbus", role: "Explorer" },
  { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein", role: "Physicist, Nobel Laureate" },
  { text: "The harder the conflict, the more glorious the triumph.", author: "Thomas Paine", role: "Political Philosopher" },
  { text: "These are the times that try men's souls.", author: "Thomas Paine", role: "Political Philosopher" },
  { text: "To improve is to change; to be perfect is to change often.", author: "Winston Churchill", role: "Prime Minister of the United Kingdom" },
  { text: "Life is 10% what happens to you and 90% how you react to it.", author: "Charles R. Swindoll", role: "Pastor & Author" },
  { text: "The only real failure in life is not to be true to the best one knows.", author: "Buddha", role: "Spiritual Teacher" },
  { text: "Three things cannot be long hidden: the sun, the moon, and the truth.", author: "Buddha", role: "Spiritual Teacher" },
  { text: "Peace comes from within. Do not seek it without.", author: "Buddha", role: "Spiritual Teacher" },
  { text: "Health is the greatest gift, contentment the greatest wealth, faithfulness the best relationship.", author: "Buddha", role: "Spiritual Teacher" },
  { text: "Do not dwell in the past, do not dream of the future, concentrate the mind on the present moment.", author: "Buddha", role: "Spiritual Teacher" },
  { text: "Knowing is not enough; we must apply. Being willing is not enough; we must do.", author: "Bruce Lee", role: "Martial Artist & Actor" },
  { text: "Don't pray for an easy life, pray for the strength to endure a difficult one.", author: "Bruce Lee", role: "Martial Artist & Actor" },
  { text: "Science is organized knowledge. Wisdom is organized life.", author: "Immanuel Kant", role: "Philosopher" },
  { text: "Happiness is when what you think, what you say, and what you do are in harmony.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "Freedom is not worth having if it does not include the freedom to make mistakes.", author: "Mahatma Gandhi", role: "Leader of Indian Independence Movement" },
  { text: "The difference between a successful person and others is not a lack of strength, not a lack of knowledge, but rather a lack of will.", author: "Vince Lombardi", role: "Football Coach" },
  { text: "Success is how high you bounce when you hit bottom.", author: "George S. Patton", role: "U.S. Army General" },
  { text: "If a man does his best, what else is there?", author: "George S. Patton", role: "U.S. Army General" },
  { text: "Lead me, follow me, or get out of my way.", author: "George S. Patton", role: "U.S. Army General" },
  { text: "In preparing for battle I have always found that plans are useless, but planning is indispensable.", author: "Dwight D. Eisenhower", role: "34th President of the United States" },
  { text: "What counts is not necessarily the size of the dog in the fight — it's the size of the fight in the dog.", author: "Dwight D. Eisenhower", role: "34th President of the United States" },
  { text: "I learned that it is the weak who are cruel, and that gentleness is to be expected only from the strong.", author: "Leo Rosten", role: "Author & Humorist" },
  { text: "No one is useless in this world who lightens the burdens of another.", author: "Charles Dickens", role: "Author" },
  { text: "It was the best of times, it was the worst of times, it was the age of wisdom, it was the age of foolishness.", author: "Charles Dickens", role: "Author" },
  { text: "Have a heart that never hardens, and a temper that never tires, and a touch that never hurts.", author: "Charles Dickens", role: "Author" },
  { text: "A room without books is like a body without a soul.", author: "Marcus Tullius Cicero", role: "Roman Statesman & Philosopher" },
  { text: "If you have a garden and a library, you have everything you need.", author: "Marcus Tullius Cicero", role: "Roman Statesman & Philosopher" },
  { text: "The life of money-making is one undertaken under compulsion, and wealth is evidently not the good we are seeking; for it is merely useful and for the sake of something else.", author: "Aristotle", role: "Philosopher" },
  { text: "The pen is mightier than the sword.", author: "Edward Bulwer-Lytton", role: "Author & Playwright" },
  { text: "Those who dare to fail miserably can achieve greatly.", author: "John F. Kennedy", role: "35th President of the United States" },
  { text: "Only a life lived for others is a life worthwhile.", author: "Albert Einstein", role: "Physicist, Nobel Laureate" },
  { text: "To thine own self be true.", author: "William Shakespeare", role: "Playwright & Poet" },
  { text: "All that glitters is not gold.", author: "William Shakespeare", role: "Playwright & Poet" },
  { text: "The fault, dear Brutus, is not in our stars, but in ourselves.", author: "William Shakespeare", role: "Playwright & Poet" },
  { text: "We know what we are, but know not what we may be.", author: "William Shakespeare", role: "Playwright & Poet" },
  { text: "Cowards die many times before their deaths; the valiant never taste of death but once.", author: "William Shakespeare", role: "Playwright & Poet" },
  { text: "Love all, trust a few, do wrong to none.", author: "William Shakespeare", role: "Playwright & Poet" },
  { text: "It is not in the stars to hold our destiny but in ourselves.", author: "William Shakespeare", role: "Playwright & Poet" },
  { text: "Our doubts are traitors, and make us lose the good we oft might win, by fearing to attempt.", author: "William Shakespeare", role: "Playwright & Poet" },
];

let currentTab = 'generate';
let currentQuotes = [];

function getCopiedHistory() {
  try {
    return JSON.parse(localStorage.getItem('ds_copied_history') || '[]');
  } catch { return []; }
}

function getCopiedIds() {
  return getCopiedHistory().map(h => h.id);
}

function saveCopied(q) {
  const history = getCopiedHistory();
  const id = getQuoteId(q);
  if (!history.find(h => h.id === id)) {
    history.unshift({ id, text: q.text, author: q.author, role: q.role, date: new Date().toISOString() });
    localStorage.setItem('ds_copied_history', JSON.stringify(history));
  }
}

function getQuoteId(q) {
  return q.author + '::' + q.text.substring(0, 40);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateStats() {
  const copiedIds = getCopiedIds();
  const remaining = quotes.filter(q => !copiedIds.includes(getQuoteId(q))).length;
  document.getElementById('stats').innerHTML =
    `<span>${remaining}</span> quotes remaining &middot; <span>${copiedIds.length}</span> used`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'generate') || (i === 1 && tab === 'history'));
  });
  if (tab === 'generate') {
    document.getElementById('search-wrap').innerHTML = '';
    document.getElementById('actions').style.display = 'flex';
    refresh();
  } else {
    document.getElementById('actions').style.display = 'none';
    document.getElementById('search-wrap').innerHTML =
      '<input class="history-search" type="text" placeholder="Search your copied quotes..." oninput="renderHistory(this.value)">';
    renderHistory('');
  }
}

function renderHistory(filter) {
  const container = document.getElementById('quotes');
  const history = getCopiedHistory();
  const filtered = filter
    ? history.filter(h => h.text.toLowerCase().includes(filter.toLowerCase()) || h.author.toLowerCase().includes(filter.toLowerCase()))
    : history;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h2>${filter ? 'No matches' : 'No history yet'}</h2>
        <p>${filter ? 'Try a different search term.' : 'Copy some quotes and they will appear here.'}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map((h, i) => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    return `
    <div class="quote-card history-card">
      <div class="quote-top">
        <span class="quote-number">${filtered.length - i}</span>
        <span class="quote-date">${dateStr}</span>
      </div>
      <p class="quote-text">${h.text}</p>
      <p class="quote-author">— ${h.author}</p>
      ${h.role ? `<p class="quote-role">${h.role}</p>` : ''}
    </div>`;
  }).join('');
}

function render(selected) {
  currentQuotes = selected;
  const container = document.getElementById('quotes');

  if (selected.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <h2>All quotes used!</h2>
        <p>You've gone through all ${quotes.length} quotes. Reset the history to start fresh.</p>
      </div>`;
    return;
  }

  container.innerHTML = selected.map((q, i) => `
    <div class="quote-card" id="card-${i}">
      <div class="quote-top">
        <span class="quote-number">${i + 1}</span>
        <button class="btn-copy" onclick="copyOne(${i})">
          <span>Copy</span>
        </button>
      </div>
      <p class="quote-text">${q.text}</p>
      <p class="quote-author">— ${q.author}</p>
      ${q.role ? `<p class="quote-role">${q.role}</p>` : ''}
    </div>
  `).join('');
  updateStats();
}

function refresh() {
  const copiedIds = getCopiedIds();
  const available = quotes.filter(q => !copiedIds.includes(getQuoteId(q)));
  const pick = shuffle(available).slice(0, 5);
  render(pick);
}

function copyOne(index) {
  const q = currentQuotes[index];
  const text = `“${q.text}”\n— ${q.author}${q.role ? ', ' + q.role : ''}`;
  navigator.clipboard.writeText(text);

  saveCopied(q);

  const card = document.getElementById('card-' + index);
  card.classList.add('copied');
  const btn = card.querySelector('.btn-copy');
  btn.classList.add('done');
  btn.innerHTML = '<span>✓ Copied</span>';

  updateStats();
  showToast('Quote copied — it won’t appear again');
}

function resetHistory() {
  if (confirm('Reset history? All quotes will become available again.')) {
    localStorage.removeItem('ds_copied_history');
    showToast('History cleared — all quotes available');
    refresh();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Migrate old format
(function migrate() {
  const old = localStorage.getItem('ds_copied_quotes');
  if (old && !localStorage.getItem('ds_copied_history')) {
    try {
      const ids = JSON.parse(old);
      const history = ids.map(id => {
        const q = quotes.find(q => getQuoteId(q) === id);
        return q ? { id, text: q.text, author: q.author, role: q.role, date: new Date().toISOString() } : null;
      }).filter(Boolean);
      localStorage.setItem('ds_copied_history', JSON.stringify(history));
      localStorage.removeItem('ds_copied_quotes');
    } catch {}
  }
})();

refresh();
</script>
