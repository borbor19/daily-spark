name: Daily Quote Email

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 6:00 AM UTC (9:00 AM Turkey time)
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick a random quote and send email
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        with:
          script: |
            const nodemailer = require('nodemailer');
            const fs = require('fs');

            const html = fs.readFileSync('index.html', 'utf8');
            const match = html.match(/const quotes = \[([\s\S]*?)\];/);
            if (!match) throw new Error('Could not find quotes array');

            const quotesRaw = match[1];
            const quotes = [];
            const regex = /\{\s*text:\s*"([^"]*)",\s*author:\s*"([^"]*)",\s*role:\s*"([^"]*)"\s*\}/g;
            let m;
            while ((m = regex.exec(quotesRaw)) !== null) {
              quotes.push({ text: m[1], author: m[2], role: m[3] });
            }

            const quote = quotes[Math.floor(Math.random() * quotes.length)];

            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_APP_PASSWORD,
              },
            });

            const emailHtml = `
            <!DOCTYPE html>
            <html>
            <body style="margin:0;padding:0;background:#0a0e1a;font-family:Georgia,serif;">
              <div style="max-width:560px;margin:40px auto;padding:40px;background:linear-gradient(135deg,#111827,#1a2235);border-radius:16px;border:1px solid #1e2d4a;">
                <div style="text-align:center;margin-bottom:32px;">
                  <span style="display:inline-block;background:linear-gradient(135deg,#1a3a8a,#2563eb);color:#fff;font-weight:bold;font-size:18px;width:44px;height:44px;line-height:44px;border-radius:10px;">DS</span>
                  <h1 style="color:#fff;font-family:Arial,sans-serif;font-size:22px;margin:12px 0 4px;">Daily Spark</h1>
                  <p style="color:#7a8baa;font-size:13px;margin:0;font-family:Arial,sans-serif;">Your quote for today</p>
                </div>
                <p style="color:#d1d5db;font-size:22px;line-height:1.7;font-style:italic;margin:0 0 20px;">
                  &ldquo;${quote.text}&rdquo;
                </p>
                <p style="color:#60a5fa;font-size:15px;font-family:Arial,sans-serif;font-weight:600;margin:0;">
                  — ${quote.author}
                </p>
                ${quote.role ? `<p style="color:#4b5e7a;font-size:13px;font-family:Arial,sans-serif;margin:4px 0 0;">${quote.role}</p>` : ''}
                <hr style="border:none;border-top:1px solid #1e2d4a;margin:32px 0 16px;">
                <p style="color:#4b5e7a;font-size:12px;font-family:Arial,sans-serif;text-align:center;margin:0;">
                  <a href="https://borbor19.github.io/daily-spark/" style="color:#2563eb;text-decoration:none;">Open Daily Spark</a> for more quotes
                </p>
              </div>
            </body>
            </html>`;

            await transporter.sendMail({
              from: `"Daily Spark" <${process.env.GMAIL_USER}>`,
              to: process.env.GMAIL_USER,
              subject: `✨ Daily Spark — "${quote.text.substring(0, 50)}..."`,
              html: emailHtml,
            });

            console.log(`Sent quote: "${quote.text}" — ${quote.author}`);
